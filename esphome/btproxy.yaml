esphome:
  name: btproxy

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

captive_portal:
logger:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "btproxy fallback"
    password: !secret btproxy_fallback_wifi_password

api:
  encryption:
    key: !secret btproxy_api_encryption_key

ota:
  - platform: esphome
    password: !secret btproxy_ota_password

esp32_ble_tracker:
bluetooth_proxy:
