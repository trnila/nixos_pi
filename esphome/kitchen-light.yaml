esphome:
  name: kitchen-light

esp8266:
  board: nodemcuv2

captive_portal:
logger:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "kitchen-light fallback"
    password: !secret kitchenlight_fallback_wifi_password

api:
  encryption:
    key: !secret kitchenlight_api_encryption_key

ota:
  - platform: esphome
    password: !secret kitchenlight_ota_password

light:
  - platform: monochromatic
    name: "Kitchen light"
    output: light_pwm

output:
  - platform: esp8266_pwm
    id: light_pwm
    pin: D7

binary_sensor:
  - platform: gpio
    pin: D6
    name: "PIR sensor"
    device_class: motion
