name: deploy

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  prek:
    # dont run on both pull request and push event
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - run: nix develop -c prek run --all-files

  deploy:
    if: github.ref == 'refs/heads/master' && github.repository == 'trnila/nixos_pi'
    runs-on: ubuntu-latest
    needs: prek
    env:
      DEPLOY_HOST: root@pi.tailea1575.ts.net
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - run: NIX_SSHOPTS="-o StrictHostKeyChecking=accept-new" nix develop -c ./deploy.sh "$DEPLOY_HOST"
