name: deploy

on:
  workflow_dispatch:
  push:

jobs:
  #prek:
  #  runs-on: ubuntu-latest
  #  steps:
  #    - uses: actions/checkout@v6
  #    - uses: cachix/install-nix-action@v31
  #    - run: nix develop -c prek run --all-files

  deploy:
    runs-on: ubuntu-latest
    #needs: prek
    env:
      DEPLOY_HOST: root@pi.tailea1575.ts.net
    steps:
      - uses: actions/checkout@v6
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - uses: cachix/install-nix-action@v31
      - run: nix develop -c 'nixos-rebuild --flake .#pi --target-host $DEPLOY_HOST --build-host $DEPLOY_HOST --no-reexec switch -v'
